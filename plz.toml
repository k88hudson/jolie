# Run all tests
[tasks.test]
run = "cargo test"

# Type-check all targets without building artifacts
[tasks.check]
run = "cargo check --all-targets"

# Format the code
[tasks.fmt]
run = "cargo fmt"

# Verify formatting without modifying files (CI-friendly)
[tasks.fmt-check]
run = "cargo fmt --check"

# Lint with clippy across all targets; any warning fails
[tasks.lint]
run = "cargo clippy --all-targets -- -D warnings"

# Run all criterion benchmarks (jolie vs rand_distr / statrs)
[tasks.bench]
run = "cargo bench"

# Run the benchmarks and print a % comparison table (jolie vs rand_distr/statrs)
[tasks.bench-table]
run = "uv run scripts/bench-table.py"

# Regenerate the R-computed reference data (needs R + jsonlite)
[tasks.gen-reference]
run = "Rscript scripts/generate_reference_data.R"

# Format, lint, and test in one shot; runs as the pre-commit gate
[tasks.ci]
run_serial = ["plz:fmt-check", "plz:lint", "plz:test"]
git_hook = "pre-commit"
